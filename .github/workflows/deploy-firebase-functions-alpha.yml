name: Deploy Firebase Functions Alpha

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-firebase-functions-alpha
  cancel-in-progress: false

jobs:
  deploy-firebase-functions-alpha:
    name: Deploy Firebase Functions to alpha
    runs-on: ubuntu-latest
    environment: alpha

    steps:
      - name: Guard branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "This workflow only deploys from main."
          echo "Current ref: $GITHUB_REF"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Validate Firebase Functions files
        run: |
          set -euo pipefail
          jq empty Firebase/firebase.json
          test -s Firebase/functions/package.json
          test -s Firebase/functions/package-lock.json
          test -s Firebase/functions/index.js

      - name: Install Functions dependencies
        run: npm --prefix Firebase/functions ci

      - name: Materialize Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret in GitHub environment alpha"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/firebase"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase/service-account.json"
          jq empty "$RUNNER_TEMP/firebase/service-account.json" >/dev/null

      - name: Deploy Firebase Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase/service-account.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_PROJECT_ID}" ]; then
            echo "Missing FIREBASE_PROJECT_ID secret in GitHub environment alpha"
            exit 1
          fi

          firebase deploy \
            --project "$FIREBASE_PROJECT_ID" \
            --config Firebase/firebase.json \
            --only functions \
            --non-interactive
