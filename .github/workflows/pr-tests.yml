name: PR Tests

on:
  pull_request:
    branches: [main]

jobs:
  ios-tests:
    name: iOS Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode_26.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.3_Release_Candidate_2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.3_Release_Candidate_2.app/Contents/Developer
          else
            echo "Xcode 26.3 not found. Available Xcodes:"
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi
          xcodebuild -version

      - name: Run unit tests
        run: |
          mkdir -p TestResults
          xcodebuild test \
            -project LoveSaving.xcodeproj \
            -scheme LoveSaving \
            -destination 'platform=iOS Simulator,OS=26.2,name=iPhone 17' \
            -resultBundlePath "$GITHUB_WORKSPACE/TestResults/unit-tests.xcresult" \
            -only-testing:LoveSavingTests

      - name: Run UI smoke tests
        run: |
          mkdir -p TestResults
          xcodebuild test \
            -project LoveSaving.xcodeproj \
            -scheme LoveSaving \
            -destination 'platform=iOS Simulator,OS=26.2,name=iPhone 17' \
            -resultBundlePath "$GITHUB_WORKSPACE/TestResults/ui-smoke-tests.xcresult" \
            -parallel-testing-enabled NO \
            -only-testing:LoveSavingUITests

      - name: Collect crash reports
        if: always()
        run: |
          mkdir -p TestResults/crash-reports
          if [ -d "$HOME/Library/Logs/DiagnosticReports" ]; then
            find "$HOME/Library/Logs/DiagnosticReports" -maxdepth 1 -type f \( -name '*.crash' -o -name '*.ips' \) -print -exec cp -n {} TestResults/crash-reports/ \;
          fi
          if [ -d "$HOME/Library/Developer/CoreSimulator/Devices" ]; then
            find "$HOME/Library/Developer/CoreSimulator/Devices" -type f -path '*/data/Library/Logs/CrashReporter/*' \( -name '*.crash' -o -name '*.ips' \) -print -exec cp -n {} TestResults/crash-reports/ \;
          fi

      - name: Upload iOS test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            TestResults/**/*.xcresult
            TestResults/crash-reports/**

  firebase-change-gate:
    name: Firebase Change Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Firebase changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          MERGE_BASE="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"
          CHANGED="$(git diff --name-only "$MERGE_BASE" "$HEAD_SHA")"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -Eq '^Firebase/(firestore\.rules|storage\.rules|firestore\.indexes\.json|firebase\.json|functions/)'; then
            echo "firebase_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "firebase_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip heavy Firebase checks when no Firebase files changed
        if: steps.detect.outputs.firebase_changed != 'true'
        run: echo "No Firebase config/rules/functions changes detected."

      - name: Setup Node.js
        if: steps.detect.outputs.firebase_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Firebase JSON files
        if: steps.detect.outputs.firebase_changed == 'true'
        run: |
          jq empty Firebase/firebase.json
          jq empty Firebase/firestore.indexes.json

      - name: Validate Firebase rules files
        if: steps.detect.outputs.firebase_changed == 'true'
        run: |
          test -s Firebase/firestore.rules
          test -s Firebase/storage.rules
          grep -E "rules_version\s*=\s*'2'" Firebase/firestore.rules Firebase/storage.rules

      - name: Validate Cloud Functions syntax and installability
        if: steps.detect.outputs.firebase_changed == 'true'
        working-directory: Firebase/functions
        run: |
          npm ci
          node --check index.js
